    <script src="config.js"></script>
    <script>
        // Mobile Menu Logic
        const toggle = document.getElementById('menu-toggle');
        const menu = document.getElementById('side-menu');
        const overlay = document.getElementById('menu-overlay');
        const toggleMenu = () => { menu.classList.toggle('active'); overlay.classList.toggle('active'); };
        toggle.addEventListener('click', toggleMenu);
        overlay.addEventListener('click', toggleMenu);

        async function fetchDoc() {
            const output = document.getElementById('doc-content-output');

            try {
                output.innerHTML = `<div class="loader"><img src="./_assets/media/cavemenloading.gif" alt="Loading..."></div>`;

                const url = window.SOCCER_CONFIG.DOC_URLS['pay-team-fees'];
                const [response] = await Promise.all([
                    fetch(url),
                    new Promise(r => setTimeout(r, 640))
                ]);
                const text = await response.text();

                const parser = new DOMParser();
                const doc = parser.parseFromString(text, 'text/html');

                const mainContentDiv = doc.getElementById('contents');

                if (mainContentDiv) {
                    // 1. Before stripping anything, find which Google CSS classes carry
                    //    text-decoration so we can re-apply them as inline styles.
                    //    Google Docs uses generated class names (e.g. .c5) with a <style> block —
                    //    it does not use inline styles or <u> tags for underlines.
                    const underlineClasses = new Set();
                    doc.querySelectorAll('style').forEach(styleEl => {
                        const rulePattern = /([^{]+)\{([^}]*)\}/g;
                        let match;
                        while ((match = rulePattern.exec(styleEl.textContent)) !== null) {
                            if (/text-decoration\s*:\s*underline/.test(match[2])) {
                                (match[1].match(/\.[\w-]+/g) || []).forEach(cn => underlineClasses.add(cn.slice(1)));
                            }
                        }
                    });
                    if (underlineClasses.size > 0) {
                        underlineClasses.forEach(cls => {
                            mainContentDiv.querySelectorAll('.' + cls).forEach(el => {
                                el.style.textDecoration = 'underline';
                            });
                        });
                    }

                    // 2. Remove Google's footer, styles, scripts, and links
                    const footer = mainContentDiv.querySelector('.doc-footer');
                    if (footer) footer.remove();
                    mainContentDiv.querySelectorAll('style').forEach(s => s.remove());
                    mainContentDiv.querySelectorAll('script').forEach(s => s.remove());
                    mainContentDiv.querySelectorAll('link').forEach(l => l.remove());

                    // 3. Strip styles and classes from the container itself
                    mainContentDiv.removeAttribute('style');
                    mainContentDiv.removeAttribute('class');

                    // 4. Strip all inline styles and classes from children to prevent the "white box",
                    //    but preserve text-decoration that we stamped on in step 1.
                    mainContentDiv.querySelectorAll('[style]').forEach(el => {
                        const textDecoration = el.style.textDecoration;
                        el.removeAttribute('style');
                        if (textDecoration && textDecoration !== 'none') {
                            el.style.textDecoration = textDecoration;
                        }
                    });
                    mainContentDiv.querySelectorAll('[class]').forEach(el => el.removeAttribute('class'));

                    // 5. Inject the cleaned HTML
                    output.innerHTML = mainContentDiv.innerHTML;
                } else {
                    output.innerHTML = "<p style='text-align:center;'>Could not find document content. The Google Doc might not be published correctly or its structure has changed.</p>";
                }

            } catch (err) {
                output.innerHTML = `<div style="text-align:center; padding: 40px; background: #111; border-radius: 4px;">⚠️ Could not load the document. Please refresh the page to try again.</div>`;
            }
        }
        fetchDoc();
    </script>
