<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>American Fork Cavemen Soccer | Roster</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&display=swap" rel="stylesheet">
    <style>
        #roster-output {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }

        #roster-output .loader {
            grid-column: 1 / -1;
        }

        .player-card {
            background: var(--af-dark-gray);
            border-radius: 4px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            transition: transform 0.2s ease;
            text-align: center;
            padding-bottom: 20px;
        }

        .player-card:hover { transform: translateY(-5px); }

        .player-image {
            width: 100%;
            height: 320px;
            object-fit: cover;
            object-position: top;
            background: #222;
            margin-bottom: 15px;
            border-bottom: 4px solid var(--af-red);
        }

        .player-name-row { font-family: 'Oswald', sans-serif; font-size: 1.6rem; text-transform: uppercase; margin: 10px 0 5px 0; }
        .player-number { color: var(--af-red); margin-right: 5px; }

        .player-detail { font-size: 0.9rem; color: #aaa; margin: 4px 0; text-transform: uppercase; letter-spacing: 0.5px; }
        .player-detail span { color: #fff; font-weight: bold; }

        @media (max-width: 768px) { /* This media query is specific to roster-output */
            #roster-output { grid-template-columns: 1fr 1fr; }
        }
        @media (max-width: 480px) {
            #roster-output { grid-template-columns: 1fr; }
        }

    </style>
</head>
<body>

    <header>
        <button class="menu-toggle" id="menu-toggle" aria-label="Open Menu">
            <span></span><span></span><span></span>
        </button>
        <div class="logo-group">
            <img src="./_assets/media/743114cb73f024a44c543e53d752d24d.png" alt="AF Soccer Logo" class="main-logo">
            <a href="index.html" class="main-title">CAVEMEN SOCCER</a>
        </div>
        <a href="https://www.instagram.com/cavemensoccer/" target="_blank" aria-label="Visit American Fork Boys Soccer on Instagram">
            <svg class="instagram-icon" viewBox="0 0 16 16"><path d="M8 0C5.829 0 5.556.01 4.703.048 3.85.088 3.269.222 2.76.42a3.917 3.917 0 0 0-1.417.923A3.927 3.927 0 0 0 .42 2.76C.222 3.268.087 3.85.048 4.7.01 5.555 0 5.827 0 8.001c0 2.172.01 2.444.048 3.297.04.852.174 1.433.372 1.942.205.526.478.972.923 1.417.444.445.89.719 1.416.923.51.198 1.09.333 1.942.372C5.555 15.99 5.827 16 8 16s2.444-.01 3.298-.048c.851-.04 1.434-.174 1.943-.372a3.916 3.916 0 0 0 1.416-.923c.445-.445.718-.891.923-1.417.197-.509.332-1.09.372-1.942C15.99 10.445 16 10.173 16 8s-.01-2.445-.048-3.299c-.04-.851-.175-1.433-.372-1.941a3.926 3.926 0 0 0-.923-1.417A3.911 3.911 0 0 0 13.24.42c-.51-.198-1.092-.333-1.943-.372C10.443.01 10.172 0 7.998 0h.003zm-.717 1.442h.718c2.136 0 2.389.007 3.232.046.78.035 1.204.166 1.486.275.373.145.64.319.92.599.28.28.453.546.598.92.11.281.24.705.275 1.485.039.843.047 1.096.047 3.231s-.008 2.389-.047 3.232c-.035.78-.166 1.203-.275 1.485a2.47 2.47 0 0 1-.599.919c-.28.28-.546.453-.92.598-.282.11-.705.24-1.485.276-.843.038-1.096.047-3.232.047s-2.39-.009-3.233-.047c-.78-.036-1.203-.166-1.485-.276a2.478 2.478 0 0 1-.92-.598 2.48 2.48 0 0 1-.6-.92c-.109-.281-.24-.705-.275-1.485-.038-.843-.046-1.096-.046-3.233 0-2.136.008-2.388.046-3.231.036-.78.166-1.204.276-1.486.145-.373.319-.64.599-.92.28-.28.546-.453.92-.598.282-.11.705-.24 1.485-.276.738-.034 1.024-.044 2.515-.045v.002zm4.988 1.328a.96.96 0 1 0 0 1.92.96.96 0 0 0 0-1.92zm-4.27 1.122a4.109 4.109 0 1 0 0 8.217 4.109 4.109 0 0 0 0-8.217zm0 1.441a2.668 2.668 0 1 1 0 5.336 2.668 2.668 0 0 1 0-5.336z"/></svg>
        </a>
    </header>

    <nav class="side-menu" id="side-menu">
        <a href="index.html">Home</a>
        <a href="schedule.html">Schedule</a>
        <a href="roster.html">Roster</a>
        <a href="coaching.html">Coaching</a>
    </nav>
    <div class="menu-overlay" id="menu-overlay"></div>

    <div class="container">
        <div class="page-header">
            <h2 id="page-title">Roster</h2>
        </div>

        <div class="controls-row">
            <div class="year-select-container">
                <label for="class-filter-select">Filter</label>
                <select id="class-filter-select" onchange="handleClassFilterChange()">
                    <option value="all">All</option>
                    <option value="senior">Seniors</option>
                    <option value="junior">Juniors</option>
                    <option value="sophomore">Sophomores</option>
                    <option value="freshman">Freshmen</option>
                    <option value="staff">Staff</option>
                </select>
            </div>
            <div class="year-select-container">
                <label for="year-select">Year</label>
                <select id="year-select" onchange="handleYearChange()"></select>
            </div>
        </div>

        <div id="team-photo-container" style="display:none; text-align:center; margin-bottom:30px;">
            <img id="team-photo" src="" alt="Team Photo" style="max-width:100%; border-radius:4px; box-shadow:0 4px 20px rgba(0,0,0,0.5);">
        </div>

        <div id="roster-output">
            <div class="loader"><img src="./_assets/media/cavemenloading.gif" alt="Loading..."></div>
        </div>
    </div>

    <script src="config.js"></script>
    <script>
        // Mobile Menu Logic
        const toggle = document.getElementById('menu-toggle');
        const menu = document.getElementById('side-menu');
        const overlay = document.getElementById('menu-overlay');

        const toggleMenu = () => { menu.classList.toggle('active'); overlay.classList.toggle('active'); };
        toggle.addEventListener('click', toggleMenu);
        overlay.addEventListener('click', toggleMenu);

        const BASES = SOCCER_CONFIG.ROSTER_BASES;
        const META_GIDS = SOCCER_CONFIG.ROSTER_META_GIDS;
        const SLOGANS = SOCCER_CONFIG.SLOGANS;

        let currentTeam = 'all';
        let currentYear = '';
        let currentClassFilter = 'all';
        let metaData = { 'all': null };
        let cachedPlayers = null;
        let cachedYear = null;

        const isStaff = pClass => /coach/i.test(pClass);

        const TEAM_PHOTOS = {
            '2026': {
                'all':       '1rQhW6FHD1ntXOKV4Hjefo62dsUTTTBpX',
                'sophomore': '1N9-N9PDCjm1xhf7Wuxv7ccWSubUthhXO',
                'junior':    '1SfMwL7bCxFGkCoh7rV5TuNdbU1kZ5nXU',
                'freshman':  '1sCSVLqPCQMsbCTbFabzpy8bgsyNK2LBn',
            },
        };

        async function loadMeta(teamId) {
            try {
                const response = await fetch(`${BASES[teamId]}&gid=${META_GIDS[teamId]}`);
                const csvText = await response.text();
                const rows = csvText.split('\n').filter(r => r.trim().length > 0);
                const mapping = {};
                rows.forEach(row => {
                    const cols = parseCSVLine(row);
                    if (cols.length >= 3 && cols[2].toUpperCase() === 'TRUE') {
                        const yearMatch = cols[0].match(/20\d{2}/);
                        if (yearMatch) mapping[yearMatch[0]] = cols[1];
                    }
                });
                metaData[teamId] = mapping;
            } catch (e) { console.error("Meta Load Error:", e); }
        }

        function updateYearDropdown() {
            const select = document.getElementById('year-select');
            const years = Object.keys(metaData[currentTeam]).sort().reverse();
            select.innerHTML = '';
            years.forEach(yr => {
                const opt = document.createElement('option');
                opt.value = yr; opt.textContent = yr;
                select.appendChild(opt);
            });
            if (!currentYear || !years.includes(currentYear)) currentYear = years[0] || '';
            select.value = currentYear;
        }

        async function fetchRoster() {
            const output = document.getElementById('roster-output');
            const title = document.getElementById('page-title');
            if (!currentYear) {
                output.innerHTML = "<p>No roster data found.</p>";
                return;
            }
            title.textContent = `${currentYear} Roster`;

            try {
                if (cachedYear !== currentYear) {
                    output.innerHTML = `<div class="loader"><img src="./_assets/media/cavemenloading.gif" alt="Loading..."></div>`;
                    const gid = metaData[currentTeam][currentYear];
                    const [response] = await Promise.all([
                        fetch(`${BASES[currentTeam]}&gid=${gid}`),
                        new Promise(r => setTimeout(r, 640))
                    ]);
                    const csvText = await response.text();
                    const rows = csvText.split('\n').filter(r => r.trim().length > 0).slice(1);

                    cachedPlayers = rows.map(line => {
                        const cols = parseCSVLine(line);
                        return {
                            number: cols[0],
                            name: cols[1],
                            pClass: cols[2],
                            position: cols[3],
                            club: cols[4],
                            photoId: cols[5]
                        };
                    })
                    .filter(p => p.name)
                    .sort((a, b) => {
                        const aStaff = isStaff(a.pClass), bStaff = isStaff(b.pClass);
                        if (aStaff !== bStaff) return aStaff ? 1 : -1;
                        const aNum = parseInt(a.number);
                        const bNum = parseInt(b.number);
                        return (isNaN(aNum) ? Infinity : aNum) - (isNaN(bNum) ? Infinity : bNum);
                    });
                    cachedYear = currentYear;
                }

                let players = cachedPlayers;
                if (currentClassFilter !== 'all') {
                    players = players.filter(p => {
                        if (currentClassFilter === 'staff') return isStaff(p.pClass);
                        return p.pClass.toLowerCase().startsWith(currentClassFilter);
                    });
                }

                const teamPhotoContainer = document.getElementById('team-photo-container');
                const teamPhotoImg = document.getElementById('team-photo');
                const teamPhotoId = TEAM_PHOTOS[currentYear]?.[currentClassFilter];
                if (teamPhotoId) {
                    teamPhotoImg.src = `https://lh3.googleusercontent.com/d/${teamPhotoId}=s1600`;
                    teamPhotoContainer.style.display = 'block';
                } else {
                    teamPhotoContainer.style.display = 'none';
                }

                let html = "";
                players.forEach(p => {
                    const imgSrc = p.photoId
                        ? `https://lh3.googleusercontent.com/d/${p.photoId}=s1000`
                        : "";
                    const detailRows = isStaff(p.pClass)
                        ? `<div class="player-detail"><span>${p.pClass}</span></div>`
                        : `<div class="player-detail">Class: <span>${p.pClass}</span></div>
                            <div class="player-detail">Position: <span>${p.position}</span></div>`;

                    html += `
                        <div class="player-card">
                            <img src="${imgSrc}" alt="${p.name}" class="player-image" onerror="this.style.opacity='0'">
                            <div class="player-name-row">
                                ${p.number ? `<span class="player-number">#${p.number}</span> ` : ''}${p.name}
                            </div>
                            ${detailRows}
                        </div>
                    `;
                });
                output.innerHTML = html || "<p>No players found.</p>";
            } catch (error) {
                output.innerHTML = `<div style="text-align:center; padding: 40px; background: #111; border-radius: 4px;">⚠️ Could not load the roster. Please refresh the page to try again.</div>`;
            }
        }

        function handleYearChange() {
            currentYear = document.getElementById('year-select').value;
            fetchRoster();
        }

        function handleClassFilterChange() {
            currentClassFilter = document.getElementById('class-filter-select').value;
            fetchRoster();
        }

        (async () => {
            // Set a random slogan immediately so the user sees something different every visit
            const loader = document.querySelector('#roster-output .loader');
            if (loader) loader.innerHTML = `<img src="./_assets/media/cavemenloading.gif" alt="Loading...">`;

            await loadMeta('all');
            updateYearDropdown();
            fetchRoster();
        })();
    </script>
</body>
</html>
