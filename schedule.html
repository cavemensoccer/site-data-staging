<head>

    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&display=swap" rel="stylesheet">
    
    <style>
        .tabs-nav {
            display: flex;
            gap: 10px;
        }

        .tab-btn {
            background: none;
            border: none;
            color: #666;
            font-family: 'Oswald', sans-serif;
            font-size: 1.1rem;
            text-transform: uppercase;
            cursor: pointer;
            padding: 10px 20px;
            letter-spacing: 1px;
            transition: color 0.3s, border-bottom 0.3s;
            border-bottom: 3px solid transparent;
        }

        .tab-btn:hover {
            color: #ccc;
        }

        .tab-btn.active {
            color: var(--af-white);
            border-bottom: 3px solid var(--af-red);
        }

        #schedule-output {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .game-card {
            display: grid;
            grid-template-columns: 100px 1fr 160px;
            background: var(--af-dark-gray);
            border-radius: 4px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            border-left: 8px solid #333;
            transition: transform 0.2s ease, border-color 0.2s ease;
        }

        .game-card:hover {
            transform: scale(1.01);
            background: #1a1a1a;
        }

        .home-game {
            border-left-color: var(--af-red);
        }

        .date-box {
            background: #222;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            text-align: center;
            line-height: 1.2;
            padding: 15px;
        }

        .date-box .month { 
            font-size: 0.9rem; 
            color: #aaa; 
            text-transform: uppercase; 
            font-family: 'Oswald', sans-serif;
        }
        .date-box .day { 
            font-size: 2rem; 
            color: var(--af-white); 
            font-family: 'Oswald', sans-serif;
        }

        .game-info {
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .opponent {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 6px;
            font-family: 'Oswald', sans-serif;
            letter-spacing: 0.5px;
        }

        .location {
            font-size: 0.95rem;
            color: #bbb;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .game-notes {
            margin-top: 12px;
            font-size: 0.85rem;
            font-weight: 700;
            color: #fff;
            background: var(--af-red);
            padding: 4px 12px;
            border-radius: 2px;
            display: inline-block;
            width: fit-content;
            text-transform: uppercase;
        }

        .time-slots {
            background: #1a1a1a;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            border-left: 1px solid #333;
            font-size: 0.95rem;
        }

        .time-row {
            display: flex;
            justify-content: space-between;
            margin: 5px 0;
            border-bottom: 1px solid #333;
            padding-bottom: 5px;
        }

        .time-row:last-child { border-bottom: none; }
        .time-label { font-weight: 800; color: #777; font-size: 0.8rem; text-transform: uppercase; }
        .time-value { font-weight: 600; color: var(--af-white); }

        @media (max-width: 768px) {
            .game-card { grid-template-columns: 80px 1fr; }
            .time-slots {
                grid-column: 1 / span 2;
                flex-direction: row;
                gap: 30px;
                border-left: none;
                border-top: 1px solid #333;
                background: #151515;
            }
            .time-row { border-bottom: none; flex-direction: column; align-items: center; flex: 1; }
        }

    </style>
</head>
<body>

    <div class="container">
        <div class="page-header"><h2 id="schedule-title">Schedule</h2></div>

        <div class="controls-row">
            <nav class="tabs-nav">
                <button id="btn-jv-varsity" class="tab-btn active" onclick="switchTeam('jv-varsity', this)">JV / Varsity</button>
                <button id="btn-fresh-soph" class="tab-btn" onclick="switchTeam('fresh-soph', this)">Fresh / Soph</button>
            </nav>
            <div class="year-select-container"><label for="year-select">Year</label><select id="year-select" onchange="handleYearChange()"></select></div>
        </div>

        <div id="schedule-output">
            <div class="loader"><img src="./_assets/media/cavemenloading.gif" alt="Loading..."></div>
        </div>
    </div>

    <script src="config.js"></script>
    <script>
        // Mobile Menu Logic
        const toggle = document.getElementById('menu-toggle');
        const menu = document.getElementById('side-menu');
        const overlay = document.getElementById('menu-overlay');
        const toggleMenu = () => { menu.classList.toggle('active'); overlay.classList.toggle('active'); };
        toggle.addEventListener('click', toggleMenu);
        overlay.addEventListener('click', toggleMenu);

        const BASES = SOCCER_CONFIG.SCHEDULE_BASES;
        const META_GIDS = SOCCER_CONFIG.SCHEDULE_META_GIDS;

        let currentTeam = 'jv-varsity';
        let currentYear = '';
        let metaData = { 'jv-varsity': null, 'fresh-soph': null };

        async function loadMeta(teamId) {
            try {
                const url = `${BASES[teamId]}&gid=${META_GIDS[teamId]}`;
                const response = await fetch(url);
                const csvText = await response.text();
                const rows = csvText.split('\n').filter(r => r.trim().length > 0);
                
                const mapping = {};
                // Start from 0 just in case there's no header, but usually i=1
                for (let i = 0; i < rows.length; i++) {
                    const cols = parseCSVLine(rows[i]);
                    if (cols.length >= 3) {
                        const yearVal = cols[0];
                        const gid = cols[1];
                        const isVisible = cols[2].toUpperCase() === 'TRUE';

                        if (!isVisible) continue;

                        // Look for a 4-digit year anywhere in the first column
                        const yearMatch = yearVal.match(/20\d{2}/);
                        if (yearMatch && gid && /^\d+$/.test(gid)) {
                            mapping[yearMatch[0]] = gid;
                        }
                    }
                }
                metaData[teamId] = mapping;
            } catch (e) {
                console.error("Meta Load Error:", e);
            }
        }

        function updateYearDropdown() {
            const select = document.getElementById('year-select');
            const years = Object.keys(metaData[currentTeam]).sort().reverse();
            
            select.innerHTML = '';
            years.forEach(yr => {
                const opt = document.createElement('option');
                opt.value = yr;
                opt.textContent = yr;
                select.appendChild(opt);
            });

            // Set to latest year if currentYear is empty or not in the new list
            if (!currentYear || !years.includes(currentYear)) {
                currentYear = years[0] || '';
            }
            select.value = currentYear;
        }

        async function fetchSchedule() {
            const output = document.getElementById('schedule-output');
            const titleElement = document.getElementById('schedule-title');

            if (!currentYear) {
                if (titleElement) titleElement.textContent = "Schedule";
                output.innerHTML = "<p style='text-align:center;'>No schedule data found.</p>";
                return;
            }

            if (titleElement) titleElement.textContent = `${currentYear} Schedule`;
            output.innerHTML = `<div class="loader"><img src="./_assets/media/cavemenloading.gif" alt="Loading..."></div>`;
            const gid = metaData[currentTeam][currentYear];
            const url = `${BASES[currentTeam]}&gid=${gid}`;

            try {
                const [response] = await Promise.all([
                    fetch(url),
                    new Promise(r => setTimeout(r, 640))
                ]);
                const csvText = await response.text();
                const rows = csvText.split('\n').filter(r => r.trim().length > 0).slice(1);

                let html = "";
                rows.forEach(line => {
                    const columns = parseCSVLine(line);
                    if (columns.length < 4) return;

                    let [dateStr, opponent, location, time1, time2, notes] = columns;
                    if (columns.length === 5) {
                        [dateStr, opponent, location, time1, notes] = columns;
                        time2 = null;
                    }

                    const isHome = location && (location.toLowerCase().includes("afhs") || location.toLowerCase().includes("home"));
                    const dateParts = dateStr.split(' ');
                    const month = dateParts[0] || "";
                    const day = dateParts[1] || "";
                    const noteBadge = (notes && notes.trim() !== "") ? `<div class="game-notes">📌 ${notes.trim()}</div>` : "";

                    let timeHtml = "";
                    if (time2 && time2.trim() !== "" && time2.toLowerCase() !== "null") {
                        timeHtml = `
                            <div class="time-row">
                                <span class="time-label">${currentTeam === 'fresh-soph' ? 'SOPHOMORE' : 'VARSITY'}</span>
                                <span class="time-value">${time2}</span>
                            </div>
                            <div class="time-row">
                                <span class="time-label">${currentTeam === 'fresh-soph' ? 'FRESHMAN' : 'JV'}</span>
                                <span class="time-value">${time1}</span>
                            </div>
                        `;
                    } else {
                        timeHtml = `
                            <div class="time-row">
                                <span class="time-label">GAME TIME</span>
                                <span class="time-value">${time1}</span>
                            </div>
                        `;
                    }

                    html += `
                        <div class="game-card ${isHome ? 'home-game' : ''}">
                            <div class="date-box">
                                <span class="month">${month}</span>
                                <span class="day">${day}</span>
                            </div>
                            <div class="game-info">
                                <div class="opponent">${opponent}</div>
                                <div class="location">📍 ${location}</div>
                                ${noteBadge}
                            </div>
                            <div class="time-slots">${timeHtml}</div>
                        </div>
                    `;
                });

                output.innerHTML = html || "<p style='text-align:center;'>No games found for this year.</p>";

            } catch (error) {
                output.innerHTML = `<div style="text-align:center; padding: 40px; background: #111; border-radius: 4px;">⚠️ Could not load the schedule. Please refresh the page to try again.</div>`;
            }
        }

        async function switchTeam(teamId, btnElement) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');
            
            currentTeam = teamId;
            currentYear = ''; // Reset year to "default" (latest) on team switch
            
            if (!metaData[teamId]) {
                await loadMeta(teamId);
            }
            updateYearDropdown();
            fetchSchedule();
        }

        function handleYearChange() {
            currentYear = document.getElementById('year-select').value;
            fetchSchedule();
        }

        (async () => {
            // Set a random slogan immediately
            const loader = document.querySelector('#schedule-output .loader');
            if (loader) loader.innerHTML = `<img src="./_assets/media/cavemenloading.gif" alt="Loading...">`;

            await loadMeta('jv-varsity');
            updateYearDropdown();
            fetchSchedule();
        })();
    </script>
